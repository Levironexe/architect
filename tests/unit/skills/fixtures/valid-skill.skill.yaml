schema_version: "2.0.0"
id: custom-valid
name: "Custom Valid Skill"
version: "1.0.0"
description: "A valid skill used by loader tests."
category: stack
language: javascript
frameworks:
  - custom
detection:
  dependencies:
    any:
      - custom-framework
structure:
  required_dirs:
    - path: src/custom
      purpose: "Custom source files."
  recommended_dirs: []
separation:
  rules:
    - concern: custom
      belongs_in: src/custom
      rule_text: "Custom concerns stay in the shared custom source area."
      example: |
        export function createCustomThing() {
          return { ok: true };
        }
patterns:
  naming:
    files: "kebab-case"
anti_patterns:
  - id: custom_smell
    severity: warning
    description: "Custom smell."
    bad_example: |
      export const customThing = () => {
        console.log('too much');
      };
    good_example: |
      export function createCustomThing() {
        return { ok: true };
      }
