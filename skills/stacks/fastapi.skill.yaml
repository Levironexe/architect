schema_version: "2.0.0"
id: fastapi
name: "FastAPI"
version: "1.0.0"
description: "FastAPI domain-driven structure with routers, services, schemas, models, and dependencies properly separated per feature domain."
category: stack
language: python
frameworks:
  - fastapi
  - pydantic
detection:
  dependencies:
    any:
      - fastapi
      - uvicorn
  files:
    - main.py
    - app/main.py
  source_indicators:
    - "from fastapi import"
    - "FastAPI()"
    - "APIRouter()"
    - "@app.get"
    - "@router.post"
structure:
  required_dirs:
    - path: "{domain}/router.py"
      purpose: "HTTP concern only. Parses the request, calls the service layer, returns the response. Never contains SQL, ORM calls, or business logic. One router.py per domain (e.g. auth/router.py, posts/router.py)."
    - path: "{domain}/service.py"
      purpose: "Business logic and orchestration for the domain. Knows nothing about HTTP. Calls models/repositories for data access. Multiple domain operations can live here as plain async functions."
    - path: "{domain}/schemas.py"
      purpose: "Pydantic models for request validation and response serialization. Input schemas are separate from output schemas. ORM models are never reused as schemas — the API contract is decoupled from the DB schema."
    - path: "{domain}/models.py"
      purpose: "SQLAlchemy ORM table definitions for the domain. No business logic here. Relationships and column definitions only."
    - path: "{domain}/dependencies.py"
      purpose: "FastAPI Depends() callables for the domain: auth checks, permission guards, DB session injection, pagination params. Runs before the route handler."
    - path: "config.py"
      purpose: "Global app settings via Pydantic BaseSettings. All environment variables read here. Never import os.environ directly in routers or services."
    - path: "database.py"
      purpose: "SQLAlchemy engine creation, session factory, and get_db() dependency. No query logic here."
    - path: "main.py"
      purpose: "App creation and router registration. Imports and includes each domain router with its prefix. No business logic."
  recommended_dirs:
    - path: "{domain}/exceptions.py"
      purpose: "Domain-specific HTTPException subclasses. Raised in service layer, caught by global exception handlers registered in main.py."
    - path: "{domain}/constants.py"
      purpose: "Enums and string/int constants specific to this domain. Avoids magic strings scattered across router and service."
separation:
  rules:
    - concern: http_handling
      belongs_in: "{domain}/router.py"
      rule_text: "Route functions are thin: extract validated request data via Pydantic schema, pass to service, return a response schema. Route functions must not contain if/else business logic, ORM calls, or raw SQL. Use Depends() for shared concerns like auth and DB sessions."
      example: |
        # auth/router.py — correct: thin router, delegates to service
        from fastapi import APIRouter, Depends
        from .schemas import LoginRequest, TokenResponse
        from .service import authenticate_user
        from .dependencies import get_current_user

        router = APIRouter(prefix="/auth", tags=["auth"])

        @router.post("/login", response_model=TokenResponse)
        async def login(payload: LoginRequest, db=Depends(get_db)):
            return await authenticate_user(payload.email, payload.password, db)
      anti_indicators:
        - "prisma"
        - "session.query"
        - "session.execute"
    - concern: business_logic
      belongs_in: "{domain}/service.py"
      rule_text: "All business rules, orchestration, and domain workflows live in service.py as plain async functions. Services receive dependencies (db session, external clients) as parameters — never import them at module level. Services do not import FastAPI or know about HTTP status codes."
      example: |
        # auth/service.py — correct: pure business logic, no HTTP knowledge
        from .models import User
        from .exceptions import InvalidCredentialsError
        from ..config import settings
        import bcrypt, jwt

        async def authenticate_user(email: str, password: str, db) -> dict:
            user = await db.execute(select(User).where(User.email == email))
            user = user.scalar_one_or_none()
            if not user or not bcrypt.checkpw(password.encode(), user.hashed_password):
                raise InvalidCredentialsError()
            token = jwt.encode({"sub": str(user.id)}, settings.secret_key)
            return {"access_token": token, "token_type": "bearer"}
      anti_indicators:
        - "from fastapi import"
        - "HTTPException"
        - "Request"
    - concern: request_response_contracts
      belongs_in: "{domain}/schemas.py"
      rule_text: "Define separate Pydantic models for input (request bodies) and output (response shapes). Never return SQLAlchemy ORM objects directly from route functions. Use model_config = ConfigDict(from_attributes=True) only on output schemas that need to read ORM fields."
      example: |
        # auth/schemas.py — separate input and output schemas
        from pydantic import BaseModel, EmailStr, ConfigDict

        class LoginRequest(BaseModel):
            email: EmailStr
            password: str

        class TokenResponse(BaseModel):
            access_token: str
            token_type: str

        class UserOut(BaseModel):
            model_config = ConfigDict(from_attributes=True)
            id: int
            email: str
            # hashed_password is intentionally excluded
patterns:
  data_flow:
    direction: "HTTP Request → Router (Pydantic schema validation) → Dependencies (Depends auth/session) → Service (business logic) → ORM Model (DB) → Output Schema → Response"
    rules:
      - "Use async def for all route functions and service functions that touch the DB or make external HTTP calls."
      - "Never use blocking I/O (requests, open(), time.sleep()) inside async def route or service functions — use httpx, aiofiles, asyncio.sleep() instead."
      - "Domain folders group router + service + schemas + models together. Do not use a flat global routers/ or models/ folder when the project has more than 3 domains."
      - "Register domain routers in main.py using app.include_router(auth.router, prefix='/api/v1'). Never import route functions directly into main.py."
      - "Read all config from a single Pydantic BaseSettings class. Import the settings singleton — never call os.environ.get() in business code."
  naming:
    routes: "Use lowercase plural nouns for URL paths (/users, /posts). Use HTTP verbs for actions, not path segments (/users/{id} DELETE not /users/{id}/delete)."
    files: "One router.py, service.py, schemas.py, models.py per domain folder. Use snake_case for all Python file and variable names."
anti_patterns:
  - id: fat_router
    severity: critical
    description: "Business logic, ORM queries, or conditional orchestration lives directly inside route functions instead of a service layer. This makes logic untestable without an HTTP client, couples domain rules to the HTTP contract, and makes reuse across background tasks or CLI commands impossible."
    bad_example: |
      # auth/router.py — wrong: business logic inside route
      @router.post("/login")
      async def login(payload: LoginRequest, db=Depends(get_db)):
          user = await db.execute(select(User).where(User.email == payload.email))
          user = user.scalar_one_or_none()
          if not user:
              raise HTTPException(status_code=401, detail="Invalid credentials")
          if not bcrypt.checkpw(payload.password.encode(), user.hashed_password):
              raise HTTPException(status_code=401, detail="Invalid credentials")
          token = jwt.encode({"sub": str(user.id)}, os.environ["SECRET"])
          return {"access_token": token}
    good_example: |
      # auth/router.py — correct: delegates to service
      @router.post("/login", response_model=TokenResponse)
      async def login(payload: LoginRequest, db=Depends(get_db)):
          return await authenticate_user(payload.email, payload.password, db)
  - id: orm_model_as_schema
    severity: warning
    description: "SQLAlchemy ORM model classes are used directly as Pydantic response_model or returned raw from route functions. This exposes internal database columns (including sensitive fields like hashed_password), tightly couples the API contract to the DB schema, and breaks when ORM lazy-load attributes are accessed outside a session."
    bad_example: |
      # wrong: returning ORM model directly
      @router.get("/users/{id}", response_model=User)  # User is SQLAlchemy model
      async def get_user(id: int, db=Depends(get_db)):
          return db.get(User, id)  # exposes all columns including hashed_password
    good_example: |
      # correct: separate output schema
      class UserOut(BaseModel):
          model_config = ConfigDict(from_attributes=True)
          id: int
          email: str
          created_at: datetime
          # hashed_password intentionally omitted

      @router.get("/users/{id}", response_model=UserOut)
      async def get_user(id: int, db=Depends(get_db)):
          user = await user_service.get_by_id(id, db)
          return user
  - id: flat_global_structure
    severity: warning
    description: "All routers, models, and schemas are placed in global top-level folders (routers/, models/, schemas/) rather than co-located per domain. This forces cross-folder navigation for every feature change and makes it impossible to extract a domain into a separate service without touching three separate directories."
    bad_example: |
      # wrong: flat global structure
      routers/
        auth.py
        posts.py
        users.py
      models/
        auth.py
        posts.py
        users.py
      schemas/
        auth.py
        posts.py
        users.py
    good_example: |
      # correct: domain-driven co-location
      auth/
        router.py
        service.py
        schemas.py
        models.py
        dependencies.py
      posts/
        router.py
        service.py
        schemas.py
        models.py
  - id: sync_blocking_in_async
    severity: critical
    description: "Synchronous blocking calls (requests.get(), time.sleep(), open()) are used inside async def route or service functions. This blocks the entire event loop thread, making all other concurrent requests wait until the blocking call completes."
    bad_example: |
      # wrong: blocking HTTP call inside async route
      @router.get("/weather")
      async def get_weather(city: str):
          response = requests.get(f"https://api.weather.com/{city}")  # blocks event loop
          return response.json()
    good_example: |
      # correct: async HTTP client
      import httpx

      @router.get("/weather")
      async def get_weather(city: str):
          async with httpx.AsyncClient() as client:
              response = await client.get(f"https://api.weather.com/{city}")
          return response.json()
