schema_version: "2.0.0"
id: react-spa
name: "React Single Page Application"
version: "1.0.0"
description: "React SPA structure with UI components, hooks, pages, services, and utilities separated."
category: stack
language: javascript
frameworks:
  - react
detection:
  dependencies:
    any:
      - react
    none:
      - next
  source_indicators:
    - "from 'react'"
    - "from \"react\""
    - "useState("
    - "useEffect("
structure:
  required_dirs:
    - path: src/components
      purpose: "Reusable UI components."
    - path: src/hooks
      purpose: "Reusable stateful behavior and view logic."
    - path: src/services
      purpose: "API calls and external integrations."
  recommended_dirs:
    - path: src/pages
      purpose: "Route-level screens or page components."
    - path: src/utils
      purpose: "Small shared helpers."
separation:
  rules:
    - concern: ui_component
      belongs_in: src/components
      rule_text: "Components render UI from props and delegated hooks instead of embedding network or business logic."
      example: |
        export function UserCard({ user }) {
          return <article>{user.name}</article>;
        }
      indicators:
        - "return <"
        - "React.FC"
    - concern: state_logic
      belongs_in: src/hooks
      rule_text: "Reusable stateful behavior belongs in hooks so pages and components stay declarative."
      example: |
        export function useUsers() {
          const [users, setUsers] = useState([]);
          useEffect(() => {
            void usersService.list().then(setUsers);
          }, []);
          return { users };
        }
      indicators:
        - "useState"
        - "useEffect"
    - concern: api_access
      belongs_in: src/services
      rule_text: "HTTP calls and third-party integrations belong in services that hooks and components consume."
      example: |
        export async function listUsers() {
          const response = await fetch('/api/users');
          return response.json();
        }
      indicators:
        - "fetch("
        - "axios."
patterns:
  data_flow:
    direction: "Page -> Component -> Hook -> Service"
    rules:
      - "Components do not perform inline API calls during render."
      - "Shared behavior moves into custom hooks."
  naming:
    components: "PascalCase component files."
    hooks: "use-prefixed hook names."
anti_patterns:
  - id: business_logic_in_components
    severity: warning
    description: "Business logic is embedded directly in UI components."
    bad_example: |
      export function SignupForm() {
        const handleSubmit = async (event) => {
          event.preventDefault();
          const payload = validateSignup(new FormData(event.currentTarget));
          await fetch('/api/signup', { method: 'POST', body: JSON.stringify(payload) });
        };

        return <form onSubmit={handleSubmit}>...</form>;
      }
    good_example: |
      export function SignupForm() {
        const { submit, error } = useSignupForm();
        return <form onSubmit={submit}>...</form>;
      }
  - id: inline_api_calls_in_render
    severity: critical
    description: "API calls occur directly during render."
    bad_example: |
      export function UsersPage() {
        fetch('/api/users').then(() => undefined);
        return <div>Loading...</div>;
      }
    good_example: |
      export function UsersPage() {
        const { users } = useUsers();
        return <UsersList users={users} />;
      }
