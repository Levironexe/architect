schema_version: "2.0.0"
id: aspnetcore-webapi
name: "ASP.NET Core Web API"
version: "1.0.0"
description: "ASP.NET Core 8+ Web API Clean Architecture with Domain, Application, Infrastructure, and API layers separated as distinct projects with a strict dependency rule."
category: stack
language: csharp
frameworks:
  - aspnetcore
  - efcore
  - mediatr
detection:
  dependencies:
    any:
      - Microsoft.AspNetCore
      - Microsoft.EntityFrameworkCore
      - MediatR
  files:
    - "*.sln"
    - Program.cs
    - appsettings.json
    - appsettings.Development.json
  source_indicators:
    - "WebApplication.CreateBuilder"
    - "IServiceCollection"
    - "builder.Services"
    - "[ApiController]"
    - "[HttpGet]"
    - "[HttpPost]"
structure:
  required_dirs:
    - path: "src/{AppName}.Domain/"
      purpose: "Core domain layer. Has zero dependencies on other projects or frameworks. Contains Entities, ValueObjects, Aggregates, Domain Events, Interfaces (IRepository<T>, IDomainService), Enums, and domain Exceptions. Business invariants and rules live here."
    - path: "src/{AppName}.Application/"
      purpose: "Use-case orchestration layer. Depends only on the Domain project. Contains CQRS Commands and Queries (one folder per feature: Features/Products/Commands/, Features/Products/Queries/), DTOs, AutoMapper Profiles, MediatR Pipeline Behaviours (validation, logging, caching), and interface definitions for infrastructure services (IEmailService, ICurrentUser). DependencyInjection.cs registers all Application services."
    - path: "src/{AppName}.Infrastructure/"
      purpose: "Framework and external service implementations. Depends on Domain and Application. Contains EF Core DbContext, Repository implementations, Migrations, Entity type configurations (Fluent API), and concrete service implementations (SmtpEmailService, S3FileService). DependencyInjection.cs registers all Infrastructure services. Never referenced directly from the API layer except in Program.cs for DI wiring."
    - path: "src/{AppName}.Api/"
      purpose: "Thin HTTP entry point. Depends on Application. References Infrastructure only in Program.cs to register DI. Contains Controllers (one per feature), Middleware (error handling, correlation ID), Filters, and extension methods for service registration. Controllers call MediatR.Send() and return ActionResult — no business logic."
    - path: "tests/"
      purpose: "Test projects mirroring the source structure: Domain.Tests (unit tests for domain logic), Application.Tests (unit tests for handlers with mocked interfaces), Api.IntegrationTests (end-to-end tests with real DB using WebApplicationFactory)."
  recommended_dirs:
    - path: "src/{AppName}.Application/Features/{Feature}/Commands/"
      purpose: "MediatR Command and CommandHandler pairs for write operations. One class file per command. CommandHandler validates via FluentValidation behaviour, calls domain/repository, returns result."
    - path: "src/{AppName}.Application/Features/{Feature}/Queries/"
      purpose: "MediatR Query and QueryHandler pairs for read operations. One class file per query. QueryHandler calls repository or a read-optimized data source, returns DTO."
    - path: "src/{AppName}.Application/Common/Behaviours/"
      purpose: "MediatR IPipelineBehavior<> implementations. ValidationBehaviour (FluentValidation), LoggingBehaviour, PerformanceBehaviour. Registered in Application DependencyInjection.cs — run for every command and query automatically."
separation:
  rules:
    - concern: domain_layer
      belongs_in: "src/{AppName}.Domain/"
      rule_text: "Domain entities, aggregates, and value objects contain business rules and invariants as methods. They have no dependencies on EF Core, ASP.NET Core, or any framework. Domain interfaces (IRepository<T>) are declared here — implemented in Infrastructure. Domain events are raised inside entity methods."
      example: |
        // Domain/Entities/Order.cs — pure domain entity, no framework dependencies
        public class Order : BaseEntity
        {
            public OrderStatus Status { get; private set; }
            public decimal TotalAmount { get; private set; }
            private readonly List<OrderItem> _items = new();
            public IReadOnlyList<OrderItem> Items => _items.AsReadOnly();

            public void AddItem(Product product, int quantity)
            {
                Guard.Against.Null(product, nameof(product));
                Guard.Against.NegativeOrZero(quantity, nameof(quantity));
                _items.Add(new OrderItem(product.Id, quantity, product.Price));
                TotalAmount += product.Price * quantity;
                AddDomainEvent(new OrderItemAddedEvent(Id, product.Id));
            }
        }
      anti_indicators:
        - "DbContext"
        - "HttpContext"
        - "IServiceCollection"
    - concern: use_cases
      belongs_in: "src/{AppName}.Application/Features/"
      rule_text: "Each use case is a MediatR Command or Query with a corresponding Handler. Commands mutate state; Queries return data. Handlers orchestrate domain objects and repository calls — they do not contain SQL, EF Core queries, or HTTP logic. FluentValidation validators are co-located with the Command/Query class."
      example: |
        // Application/Features/Orders/Commands/CreateOrder/CreateOrderCommand.cs
        public record CreateOrderCommand(int CustomerId, List<OrderItemDto> Items) : IRequest<int>;

        public class CreateOrderCommandValidator : AbstractValidator<CreateOrderCommand>
        {
            public CreateOrderCommandValidator()
            {
                RuleFor(x => x.CustomerId).GreaterThan(0);
                RuleFor(x => x.Items).NotEmpty();
            }
        }

        // Application/Features/Orders/Commands/CreateOrder/CreateOrderCommandHandler.cs
        public class CreateOrderCommandHandler : IRequestHandler<CreateOrderCommand, int>
        {
            private readonly IOrderRepository _orderRepository;
            private readonly IProductRepository _productRepository;

            public CreateOrderCommandHandler(IOrderRepository orderRepository, IProductRepository productRepository)
            {
                _orderRepository = orderRepository;
                _productRepository = productRepository;
            }

            public async Task<int> Handle(CreateOrderCommand request, CancellationToken ct)
            {
                var order = new Order(request.CustomerId);
                foreach (var item in request.Items)
                {
                    var product = await _productRepository.GetByIdAsync(item.ProductId, ct);
                    order.AddItem(product, item.Quantity);
                }
                await _orderRepository.AddAsync(order, ct);
                return order.Id;
            }
        }
    - concern: api_controllers
      belongs_in: "src/{AppName}.Api/Controllers/"
      rule_text: "Controllers are thin HTTP adapters. They receive the request, call _mediator.Send(command/query), and return an IActionResult. No business logic, no direct service calls, no EF Core usage. Use ProducesResponseType attributes for Swagger documentation."
      example: |
        // Api/Controllers/OrdersController.cs — correct: thin controller
        [ApiController]
        [Route("api/[controller]")]
        public class OrdersController : ControllerBase
        {
            private readonly IMediator _mediator;
            public OrdersController(IMediator mediator) => _mediator = mediator;

            [HttpPost]
            [ProducesResponseType(typeof(int), StatusCodes.Status201Created)]
            public async Task<IActionResult> Create(CreateOrderCommand command, CancellationToken ct)
            {
                var orderId = await _mediator.Send(command, ct);
                return CreatedAtAction(nameof(GetById), new { id = orderId }, orderId);
            }
        }
      anti_indicators:
        - "DbContext"
        - "new SqlConnection"
        - ".SaveChangesAsync()"
patterns:
  data_flow:
    direction: "HTTP Request → Controller → IMediator.Send(Command/Query) → Pipeline Behaviours (validation, logging) → Handler (Application) → IRepository (Domain interface) → EF Core Repository (Infrastructure) → DTO → Response"
    rules:
      - "Dependency rule: Domain ← Application ← Infrastructure ← API. Inner layers never reference outer layers."
      - "Each layer exposes a static DependencyInjection.cs with an AddXxx(this IServiceCollection) extension method. Program.cs calls builder.Services.AddApplication().AddInfrastructure(config) — not individual registrations."
      - "Repository interfaces live in Domain; implementations live in Infrastructure. The Application layer depends only on the interface — it never imports EF Core types."
      - "Return Result<T> or domain exceptions from handlers instead of nullable types. Use middleware to convert domain exceptions to HTTP status codes."
      - "EF Core entity configurations use Fluent API in separate IEntityTypeConfiguration<T> classes in Infrastructure/Persistence/Configurations/ — not Data Annotations on domain entities."
  naming:
    commands: "Use verb-noun naming: CreateOrderCommand, UpdateProductCommand, DeleteUserCommand. Queries: GetOrderByIdQuery, ListActiveUsersQuery."
    files: "One file per Command/Query + Handler pair. Co-locate the FluentValidation validator in the same file or folder."
anti_patterns:
  - id: logic_in_controllers
    severity: critical
    description: "Business logic, domain rules, or data access code is placed directly in controller action methods. This makes the logic untestable without an HTTP server, ties it to the HTTP protocol, and prevents reuse from background jobs or other entry points."
    bad_example: |
      // wrong: business logic in controller
      [HttpPost]
      public async Task<IActionResult> CreateOrder(CreateOrderRequest request)
      {
          var customer = await _context.Customers.FindAsync(request.CustomerId);
          if (customer == null) return NotFound();
          if (customer.CreditLimit < request.TotalAmount) return BadRequest("Insufficient credit");

          var order = new Order { CustomerId = request.CustomerId, TotalAmount = request.TotalAmount };
          _context.Orders.Add(order);
          await _context.SaveChangesAsync();
          customer.CreditLimit -= request.TotalAmount;
          await _context.SaveChangesAsync();
          return CreatedAtAction(nameof(Get), new { id = order.Id }, order);
      }
    good_example: |
      // correct: controller delegates to MediatR
      [HttpPost]
      public async Task<IActionResult> CreateOrder(CreateOrderCommand command, CancellationToken ct)
      {
          var orderId = await _mediator.Send(command, ct);
          return CreatedAtAction(nameof(GetById), new { id = orderId }, orderId);
      }
  - id: entity_returned_from_controller
    severity: warning
    description: "EF Core entity objects are returned directly from controller actions. This exposes the full database schema (including navigation properties that cause circular references), can trigger lazy-load queries outside the request lifetime, and couples the API contract to the database structure."
    bad_example: |
      // wrong: returning EF entity directly
      [HttpGet("{id}")]
      public async Task<ActionResult<Order>> GetOrder(int id)
      {
          var order = await _context.Orders
              .Include(o => o.Items)
              .FirstOrDefaultAsync(o => o.Id == id);
          return order ?? NotFound();  // exposes all entity fields + navigation props
      }
    good_example: |
      // correct: return a DTO mapped by the query handler
      [HttpGet("{id}")]
      public async Task<ActionResult<OrderDto>> GetOrder(int id, CancellationToken ct)
      {
          var result = await _mediator.Send(new GetOrderByIdQuery(id), ct);
          return result is null ? NotFound() : Ok(result);
      }
  - id: di_all_in_program
    severity: warning
    description: "All service registrations are placed directly in Program.cs instead of per-layer extension methods. As the app grows, Program.cs becomes hundreds of lines long, layers lose their encapsulation of their own dependencies, and moving a layer to a different project requires also updating Program.cs."
    bad_example: |
      // wrong: all DI in Program.cs
      builder.Services.AddDbContext<AppDbContext>(opt => opt.UseSqlServer(connStr));
      builder.Services.AddScoped(typeof(IRepository<>), typeof(Repository<>));
      builder.Services.AddScoped<IEmailService, SmtpEmailService>();
      builder.Services.AddMediatR(cfg => cfg.RegisterServicesFromAssembly(typeof(CreateOrderCommand).Assembly));
      builder.Services.AddValidatorsFromAssembly(typeof(CreateOrderCommand).Assembly);
    good_example: |
      // correct: per-layer extension methods
      // Application/DependencyInjection.cs
      public static IServiceCollection AddApplication(this IServiceCollection services)
      {
          services.AddMediatR(cfg => cfg.RegisterServicesFromAssembly(Assembly.GetExecutingAssembly()));
          services.AddValidatorsFromAssembly(Assembly.GetExecutingAssembly());
          services.AddTransient(typeof(IPipelineBehavior<,>), typeof(ValidationBehaviour<,>));
          return services;
      }

      // Program.cs — clean composition root
      builder.Services
          .AddApplication()
          .AddInfrastructure(builder.Configuration);
  - id: anemic_domain
    severity: warning
    description: "Domain entities are plain data containers with only public getters/setters and no behavior. All business logic lives in Application layer services or handlers. This removes the value of a domain model — invariants are not enforced, and logic is scattered."
    bad_example: |
      // wrong: anemic entity — just a data bag
      public class Order
      {
          public int Id { get; set; }
          public decimal TotalAmount { get; set; }
          public OrderStatus Status { get; set; }
          public List<OrderItem> Items { get; set; } = new();
      }
      // Business rules enforced externally in handler — no encapsulation
    good_example: |
      // correct: entity with behavior and invariants
      public class Order
      {
          public decimal TotalAmount { get; private set; }
          public OrderStatus Status { get; private set; }
          private readonly List<OrderItem> _items = new();

          public void AddItem(Product product, int quantity)
          {
              if (Status != OrderStatus.Draft)
                  throw new OrderAlreadyConfirmedException(Id);
              _items.Add(new OrderItem(product, quantity));
              TotalAmount += product.Price * quantity;
          }

          public void Confirm()
          {
              if (!_items.Any())
                  throw new EmptyOrderException(Id);
              Status = OrderStatus.Confirmed;
          }
      }
