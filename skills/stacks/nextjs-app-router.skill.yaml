schema_version: "2.0.0"
id: nextjs-app-router
name: "Next.js App Router"
version: "1.0.0"
description: "Next.js App Router structure with app routes, shared components, library code, and server actions separated."
category: stack
language: javascript
frameworks:
  - next
  - react
detection:
  dependencies:
    any:
      - next
  files:
    - next.config.js
    - next.config.mjs
    - next.config.ts
    - app
  source_indicators:
    - "next/"
    - "\"use client\""
    - "'use client'"
structure:
  required_dirs:
    - path: app
      purpose: "App Router routes, layouts, and server components."
    - path: components
      purpose: "Shared UI components."
    - path: lib
      purpose: "Shared server/client utilities and data access helpers."
  recommended_dirs:
    - path: actions
      purpose: "Server actions grouped away from UI components."
    - path: hooks
      purpose: "Client-only reusable behavior."
separation:
  rules:
    - concern: routing
      belongs_in: app
      rule_text: "The app directory owns route structure, layouts, pages, and route handlers using App Router conventions."
      example: |
        export default async function UsersPage() {
          const users = await listUsers();
          return <UsersTable users={users} />;
        }
    - concern: shared_ui
      belongs_in: components
      rule_text: "Reusable UI belongs in components so route files stay focused on composition and data loading."
      example: |
        export function UsersTable({ users }) {
          return <table>{users.map((user) => <tr key={user.id}>{user.name}</tr>)}</table>;
        }
    - concern: server_action
      belongs_in: actions
      rule_text: "Server mutations and form handlers live in actions with an explicit server boundary."
      example: |
        'use server';

        export async function createUser(formData) {
          return saveUser({ name: formData.get('name') });
        }
      indicators:
        - "\"use server\""
        - "'use server'"
patterns:
  data_flow:
    direction: "Route -> Server Component/Action -> Lib"
    rules:
      - "Use server components by default."
      - "Use client components only for interactivity."
  naming:
    routes: "Use App Router file conventions."
anti_patterns:
  - id: use_client_everywhere
    severity: warning
    description: "Client directive is applied broadly instead of only where needed."
    bad_example: |
      'use client';

      export default function RootLayout({ children }) {
        return <html><body>{children}</body></html>;
      }
    good_example: |
      export default function RootLayout({ children }) {
        return <html><body>{children}</body></html>;
      }
  - id: client_data_fetching_by_default
    severity: warning
    description: "Data fetching is moved to client components without a user interaction need."
    bad_example: |
      'use client';

      export default function UsersPage() {
        const [users, setUsers] = useState([]);
        useEffect(() => {
          fetch('/api/users').then((response) => response.json()).then(setUsers);
        }, []);
        return <UsersTable users={users} />;
      }
    good_example: |
      export default async function UsersPage() {
        const users = await listUsers();
        return <UsersTable users={users} />;
      }
