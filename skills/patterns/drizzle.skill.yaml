schema_version: "2.0.0"
id: drizzle
name: "Drizzle ORM"
version: "1.0.0"
description: "SQL-first Drizzle ORM with TypeScript schema, drizzle-kit migrations, and explicit query building."
category: pattern
language: javascript
frameworks:
  - drizzle-orm
detection:
  dependencies:
    any:
      - drizzle-orm
  source_indicators:
    - "drizzle("
    - "pgTable("
    - "mysqlTable("
    - "sqliteTable("
structure:
  required_dirs:
    - path: src/db
      purpose: "Drizzle schema definitions — the single source of truth for table structure and TypeScript types."
    - path: drizzle
      purpose: "Generated migration SQL files managed by drizzle-kit — never edit manually."
  recommended_dirs:
    - path: src/lib
      purpose: "Drizzle client singleton and database connection setup."
separation:
  rules:
    - concern: schema_definition
      belongs_in: src/db
      rule_text: "Define all table schemas in src/db/schema.ts using Drizzle's TypeScript API. This is the single source of truth for types and table structure — never define tables elsewhere."
      example: |
        // src/db/schema.ts
        import { pgTable, text, timestamp } from 'drizzle-orm/pg-core';
        export const users = pgTable('users', {
          id: text('id').primaryKey(),
          email: text('email').notNull().unique(),
          createdAt: timestamp('created_at').defaultNow().notNull(),
        });
      indicators:
        - "pgTable("
        - "mysqlTable("
        - "sqliteTable("
    - concern: migrations
      belongs_in: drizzle
      rule_text: "Run `npx drizzle-kit generate` to create migration files and `npx drizzle-kit migrate` to apply them. Never write raw SQL migration files manually."
      example: |
        # ✓ Generate and apply migrations via drizzle-kit
        npx drizzle-kit generate
        npx drizzle-kit migrate
    - concern: query_building
      belongs_in: src/db
      rule_text: "Use Drizzle's query builder API — avoid raw SQL strings for application queries. If complex SQL is needed, use the `sql` template literal tag, not plain string concatenation."
      example: |
        // ✓ Drizzle query builder
        db.select().from(users).where(eq(users.email, email));
      anti_indicators:
        - "db.execute(`SELECT"
        - "db.execute(\"SELECT"
patterns:
  data_flow:
    direction: "Service → Drizzle Query → Database"
    rules:
      - "Services call Drizzle queries — never call db directly from controllers or API routes."
      - "Schema in src/db/ is the single source of truth for all table definitions."
      - "Migrations generated by drizzle-kit are never edited manually."
  naming:
    schema: "src/db/schema.ts"
    client: "src/lib/db.ts"
anti_patterns:
  - id: raw_sql_strings
    severity: warning
    description: "Using string concatenation or template literals to build SQL queries — bypasses type safety and risks SQL injection."
    bad_example: |
      // ❌ Raw SQL string — not type-safe, injection risk
      db.execute(`SELECT * FROM users WHERE email = '${email}'`);
    good_example: |
      // ✓ Drizzle query builder — type-safe
      db.select().from(users).where(eq(users.email, email));
  - id: multiple_db_clients
    severity: critical
    description: "Creating new Drizzle/connection instances in multiple files instead of sharing one singleton — causes connection pool exhaustion."
    bad_example: |
      // ❌ New connection in every module
      const db = drizzle(new Pool({ connectionString: process.env.DATABASE_URL }));
    good_example: |
      // ✓ Import singleton from src/lib/db.ts
      import { db } from '@/lib/db';
  - id: schema_outside_db_dir
    severity: warning
    description: "Defining table schemas outside src/db/ scatters the source of truth and makes migrations unreliable."
    bad_example: |
      // ❌ Schema defined in the model file
      // src/models/user.model.ts
      export const users = pgTable('users', { ... });
    good_example: |
      // ✓ All schemas in src/db/schema.ts
      export const users = pgTable('users', { ... });
