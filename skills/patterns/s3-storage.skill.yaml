schema_version: "2.0.0"
id: s3-storage
name: "AWS S3 / R2 Storage"
version: "1.0.0"
description: "Object storage with pre-signed URLs for direct browser uploads, key-based references, and server-side S3 client."
category: pattern
language: javascript
frameworks: []
detection:
  dependencies:
    any:
      - "@aws-sdk/client-s3"
      - "@aws-sdk/s3-request-presigner"
  source_indicators:
    - "S3Client"
    - "PutObjectCommand"
    - "getSignedUrl"
    - "from '@aws-sdk/client-s3'"
structure:
  required_dirs: []
  recommended_dirs:
    - path: src/lib
      purpose: "S3 client singleton configuration — imported by services only."
    - path: src/services
      purpose: "Upload and download service logic — generates pre-signed URLs and manages object keys."
separation:
  rules:
    - concern: presigned_urls
      belongs_in: src/services
      rule_text: "Never proxy file bytes through your server. The upload flow is: (1) client requests a pre-signed PUT URL from your API, (2) client uploads directly to S3, (3) client notifies your API with the S3 key. This avoids server memory pressure and bandwidth costs."
      example: |
        // src/services/upload.service.ts
        import { getSignedUrl } from '@aws-sdk/s3-request-presigner';
        import { PutObjectCommand } from '@aws-sdk/client-s3';
        import { s3 } from '@/lib/s3';
        export async function createUploadUrl(filename: string, contentType: string) {
          const key = `uploads/${Date.now()}-${filename}`;
          const url = await getSignedUrl(s3, new PutObjectCommand({
            Bucket: process.env.S3_BUCKET, Key: key, ContentType: contentType
          }), { expiresIn: 300 });
          return { url, key };
        }
    - concern: key_storage
      belongs_in: src/models
      rule_text: "Store the S3 object key (e.g. uploads/1234-photo.jpg) in your database — NOT the full S3 URL. Generate signed download URLs on-demand. This allows bucket migration without changing stored data."
      example: |
        // ✓ Store key only
        await db.update({ avatarKey: 'uploads/1234-photo.jpg' });
        // ✓ Generate download URL when needed
        const downloadUrl = await getSignedUrl(s3, new GetObjectCommand({ Bucket: BUCKET, Key: avatarKey }));
    - concern: client_singleton
      belongs_in: src/lib
      rule_text: "Create the S3 client singleton in src/lib/s3.ts. Never instantiate S3Client outside this file. AWS credentials must come from environment variables — never hardcoded."
      example: |
        // src/lib/s3.ts
        import { S3Client } from '@aws-sdk/client-s3';
        export const s3 = new S3Client({ region: process.env.AWS_REGION! });
      anti_indicators:
        - "new S3Client({"
patterns:
  data_flow:
    direction: "Client requests presigned URL → API generates URL → Client uploads directly to S3 → Client notifies API with key"
    rules:
      - "File bytes never touch your server — client uploads directly to S3."
      - "Store S3 object keys in DB, not full URLs."
      - "Generate download URLs on-demand with short expiry."
  error_handling:
    recommended: "Set Content-Type and expiresIn on all pre-signed URLs. Validate file type and size server-side before generating the URL."
anti_patterns:
  - id: proxy_upload
    severity: warning
    description: "Receiving uploaded files in your server and re-uploading to S3 — doubles bandwidth cost, risks memory exhaustion, and adds latency."
    bad_example: |
      // ❌ File received by server, then uploaded to S3
      app.post('/upload', upload.single('file'), async (req, res) => {
        await s3.send(new PutObjectCommand({ Body: req.file.buffer, Bucket: BUCKET, Key: key }));
        res.json({ key });
      });
    good_example: |
      // ✓ Server generates presigned URL — client uploads directly
      app.post('/upload/presign', async (req, res) => {
        const { url, key } = await createUploadUrl(req.body.filename, req.body.contentType);
        res.json({ url, key });
      });
  - id: store_full_url
    severity: warning
    description: "Storing full S3 URLs in the database — breaks when bucket, region, or CDN changes. The URL becomes stale and requires a data migration."
    bad_example: |
      // ❌ Full URL stored — breaks on bucket or CDN migration
      await db.update({ avatarUrl: 'https://my-bucket.s3.us-east-1.amazonaws.com/uploads/photo.jpg' });
    good_example: |
      // ✓ Store key only — generate URL on demand
      await db.update({ avatarKey: 'uploads/1234-photo.jpg' });
  - id: hardcoded_credentials
    severity: critical
    description: "Embedding AWS access keys directly in source code — exposes credentials in git history and to anyone with repo access."
    bad_example: |
      // ❌ Hardcoded credentials — major security risk
      new S3Client({
        credentials: { accessKeyId: 'AKIA...', secretAccessKey: 'abc123...' }
      });
    good_example: |
      // ✓ Credentials from environment or IAM role — no hardcoding
      new S3Client({ region: process.env.AWS_REGION });
